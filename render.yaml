services:
  - type: web
    name: alexandria-backend
    env: python
    region: oregon
    plan: free
    branch: main
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
    pythonVersion: 3.11
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: ASSEMBLYAI_API_KEY
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
      - key: ENABLE_GEMINI
        value: "1"
      - key: ENABLE_CHROMA
        value: "1"
      - key: ENABLE_EMBEDDINGS
        value: "1"
      - key: ENABLE_YOUTUBE_ASR
        value: "1"
      - key: ENABLE_METADATA_FALLBACK
        value: "0"
    headers:
      - path: /
        name: Access-Control-Allow-Origin
        value: "*"
      - path: /
        name: Access-Control-Allow-Methods
        value: "GET, POST, PUT, DELETE, OPTIONS"
