<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alexandria - AI Video Learning</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 450px;
      min-height: 550px;
      max-height: 700px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #fbf9f6 0%, #f5f3f0 100%);
      color: #1b1c1a;
      overflow-y: auto;
    }

    .aurora-bg {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      pointer-events: none;
      z-index: 0;
    }

    .aurora {
      position: absolute;
      border-radius: 50%;
      filter: blur(50px);
      opacity: 0.15;
    }

    .aurora-1 {
      width: 200px;
      height: 200px;
      background: #0ea5e9;
      top: -50px;
      left: -50px;
    }

    .aurora-2 {
      width: 150px;
      height: 150px;
      background: #f59e0b;
      bottom: -30px;
      right: -30px;
    }

    .container {
      position: relative;
      z-index: 1;
      padding: 1.5rem;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid rgba(27, 48, 34, 0.1);
    }

    .header h1 {
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #10b981, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 0;
    }

    .header-subtitle {
      font-size: 0.7rem;
      color: #4b5563;
      margin-top: 0.2rem;
    }

    .user-info {
      font-size: 0.8rem;
      color: #4b5563;
      text-align: right;
    }

    .user-info-name {
      font-weight: 600;
      color: #061b0e;
    }

    /* Auth Section */
    #authSection {
      display: none;
    }

    .auth-container {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(10px);
      border-radius: 1.5rem;
      padding: 1.5rem;
      border: 1px solid rgba(27, 48, 34, 0.1);
    }

    .auth-tabs {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
      border-bottom: 2px solid rgba(27, 48, 34, 0.1);
    }

    .auth-tab-btn {
      flex: 1;
      padding: 0.8rem;
      background: none;
      border: none;
      color: #4b5563;
      font-weight: 600;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
    }

    .auth-tab-btn.active {
      color: #10b981;
      border-bottom-color: #10b981;
    }

    .auth-tab-content {
      display: none;
    }

    .auth-tab-content.active {
      display: block;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #061b0e;
      margin-bottom: 0.4rem;
    }

    .form-group input {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid rgba(27, 48, 34, 0.2);
      border-radius: 0.6rem;
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #10b981;
      box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
    }

    .btn {
      width: 100%;
      padding: 0.85rem;
      border: none;
      border-radius: 0.6rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      font-size: 0.95rem;
    }

    .btn-primary {
      background: #10b981;
      color: white;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
    }

    .btn-primary:hover:not(:disabled) {
      background: #059669;
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(16, 185, 129, 0.4);
    }

    .btn-secondary {
      background: #e9e8e5;
      color: #061b0e;
    }

    .btn-secondary:hover:not(:disabled) {
      background: #e3e2e0;
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* Main Section */
    #mainSection {
      display: none;
    }

    .video-info {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(27, 48, 34, 0.1);
      border-radius: 1rem;
      padding: 1rem;
      margin-bottom: 1rem;
      font-size: 0.85rem;
    }

    .video-info strong {
      color: #061b0e;
    }

    .video-title {
      color: #4b5563;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 0.3rem;
    }

    .tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      overflow-x: auto;
      border-bottom: 2px solid rgba(27, 48, 34, 0.1);
      padding-bottom: 0.5rem;
    }

    .tab-btn {
      padding: 0.7rem 1rem;
      background: none;
      border: none;
      color: #4b5563;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      font-size: 0.9rem;
      transition: all 0.2s;
      border-bottom: 3px solid transparent;
      margin-bottom: -0.5rem;
    }

    .tab-btn.active {
      color: #10b981;
      border-bottom-color: #10b981;
    }

    .tab-content {
      display: none;
      animation: fadeIn 0.2s;
    }

    .tab-content.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .feature-group {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(27, 48, 34, 0.1);
      border-radius: 1rem;
      padding: 1rem;
      margin-bottom: 1rem;
    }

    .feature-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #061b0e;
      margin-bottom: 0.5rem;
    }

    .feature-group select,
    .feature-group input,
    .feature-group textarea {
      width: 100%;
      padding: 0.6rem;
      border: 1px solid rgba(27, 48, 34, 0.2);
      border-radius: 0.5rem;
      font-family: inherit;
      font-size: 0.9rem;
    }

    .feature-group textarea {
      resize: vertical;
      min-height: 60px;
      max-height: 120px;
    }

    .output-area {
      background: rgba(16, 185, 129, 0.05);
      border: 1px solid rgba(16, 185, 129, 0.2);
      border-radius: 0.6rem;
      padding: 0.8rem;
      font-size: 0.85rem;
      line-height: 1.5;
      max-height: 150px;
      overflow-y: auto;
      margin-top: 0.5rem;
    }

    .status-message {
      padding: 0.8rem;
      border-radius: 0.6rem;
      margin-bottom: 1rem;
      font-size: 0.9rem;
      display: none;
    }

    .status-message.show {
      display: block;
    }

    .status-message.success {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid #10b981;
      color: #059669;
    }

    .status-message.error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid #ef4444;
      color: #dc2626;
    }

    .loading {
      display: inline-block;
      width: 0.8rem;
      height: 0.8rem;
      background: currentColor;
      border-radius: 50%;
      animation: pulse 1.4s infinite;
    }

    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.4; }
      40% { opacity: 1; }
    }

    .url-examples {
      font-size: 0.75rem;
      color: #4b5563;
      margin-top: 0.3rem;
      line-height: 1.3;
    }

    .footer {
      display: flex;
      gap: 0.5rem;
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(27, 48, 34, 0.1);
    }

    .footer button {
      flex: 1;
      padding: 0.6rem;
      font-size: 0.85rem;
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(27, 48, 34, 0.2);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(27, 48, 34, 0.3);
    }
  </style>
</head>
<body>
  <div class="aurora-bg">
    <div class="aurora aurora-1"></div>
    <div class="aurora aurora-2"></div>
  </div>

  <div class="container">
    <!-- Header -->
    <div class="header">
      <div>
        <h1>Alexandria</h1>
        <div class="header-subtitle">AI Learning Companion v2.0</div>
      </div>
      <div class="user-info">
        <div id="userDisplay" style="display: none;">
          <div class="user-info-name" id="userName">User</div>
          <div>Logged in</div>
        </div>
        <div id="guestDisplay">
          <div>👤 Guest</div>
        </div>
      </div>
    </div>

    <!-- Status Messages -->
    <div id="statusMessage" class="status-message"></div>

    <!-- Auth Section -->
    <div id="authSection">
      <div class="auth-container">
        <div class="auth-tabs">
          <button class="auth-tab-btn active" data-tab="login">Login</button>
          <button class="auth-tab-btn" data-tab="signup">Sign Up</button>
        </div>

        <!-- Login Tab -->
        <form id="loginForm" class="auth-tab-content active">
          <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" placeholder="you@example.com" required>
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Min. 8 characters" required>
          </div>
          <button type="submit" class="btn btn-primary">
            <span id="loginBtnText">Login</span>
          </button>
        </form>

        <!-- Signup Tab -->
        <form id="signupForm" class="auth-tab-content">
          <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" placeholder="your_username" required>
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" placeholder="you@example.com" required>
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Min. 8 characters" required>
          </div>
          <div class="form-group">
            <label>Full Name (Optional)</label>
            <input type="text" name="fullName" placeholder="John Doe">
          </div>
          <button type="submit" class="btn btn-primary">
            <span id="signupBtnText">Create Account</span>
          </button>
        </form>
      </div>
    </div>

    <!-- Main Section -->
    <div id="mainSection">
      <!-- Video Info -->
      <div id="videoInfo" class="video-info" style="display: none;">
        <strong>📺 Current Video:</strong>
        <div class="video-title" id="videoTitle"></div>
      </div>

      <!-- Feature Tabs -->
      <div class="tabs">
        <button class="tab-btn active" data-tab="summary">📝 Summary</button>
        <button class="tab-btn" data-tab="qa">💬 Q&A</button>
        <button class="tab-btn" data-tab="export">📤 Export</button>
        <button class="tab-btn" data-tab="translate">🌍 Languages</button>
        <button class="tab-btn" data-tab="streaming">🎵 Streaming</button>
        <button class="tab-btn" data-tab="library">📚 Library</button>
      </div>

      <!-- Tab: Summary -->
      <div id="summary-tab" class="tab-content active">
        <div class="feature-group">
          <button class="btn btn-primary" id="generateSummaryBtn">
            <span>⚡ Generate Summary</span>
          </button>
          <div id="summaryOutput" class="output-area" style="display: none;"></div>
        </div>
      </div>

      <!-- Tab: Q&A -->
      <div id="qa-tab" class="tab-content">
        <div class="feature-group">
          <label>Ask a Question</label>
          <textarea id="questionInput" placeholder="What was the main topic discussed?"></textarea>
          <button class="btn btn-primary" id="askBtn" style="margin-top: 0.5rem;">
            <span>Ask Question</span>
          </button>
          <div id="qaOutput" class="output-area" style="display: none;"></div>
        </div>
      </div>

      <!-- Tab: Export -->
      <div id="export-tab" class="tab-content">
        <div class="feature-group">
          <label>Export Format</label>
          <select id="exportType">
            <option value="markdown">📄 Markdown</option>
            <option value="docx">📘 Word (.docx)</option>
            <option value="notion">📌 Notion</option>
            <option value="google_docs">🔗 Google Docs</option>
          </select>
          <button class="btn btn-primary" id="exportBtn" style="margin-top: 0.5rem;">
            <span>Export Summary</span>
          </button>
          <div id="exportOutput" class="output-area" style="display: none;"></div>
        </div>
        <div class="feature-group">
          <button class="btn btn-secondary" id="saveVideoBtn">
            <span>💾 Save to Library</span>
          </button>
        </div>
      </div>

      <!-- Tab: Languages -->
      <div id="translate-tab" class="tab-content">
        <div class="feature-group">
          <label>Translate Summary To:</label>
          <select id="languageSelect">
            <option value="">-- Select Language --</option>
            <option value="es">🇪🇸 Spanish</option>
            <option value="fr">🇫🇷 French</option>
            <option value="de">🇩🇪 German</option>
            <option value="it">🇮🇹 Italian</option>
            <option value="pt">🇵🇹 Portuguese</option>
            <option value="ja">🇯🇵 Japanese</option>
            <option value="zh">🇨🇳 Chinese</option>
            <option value="ko">🇰🇷 Korean</option>
            <option value="ru">🇷🇺 Russian</option>
            <option value="ar">🇸🇦 Arabic</option>
            <option value="hi">🇮🇳 Hindi</option>
          </select>
          <button class="btn btn-primary" id="translateBtn" style="margin-top: 0.5rem;">
            <span>🔄 Translate</span>
          </button>
          <div id="translateOutput" class="output-area" style="display: none;"></div>
        </div>
      </div>

      <!-- Tab: Streaming -->
      <div id="streaming-tab" class="tab-content">
        <div class="feature-group">
          <label>Add Streaming Content</label>
          <input type="text" id="streamingUrl" placeholder="Paste Spotify/Podcast URL">
          <div class="url-examples">
            Examples:<br>
            • https://open.spotify.com/episode/ID<br>
            • RSS feed URL<br>
            • Auto-detected from URL
          </div>
          <button class="btn btn-primary" id="addStreamingBtn" style="margin-top: 0.5rem;">
            <span>➕ Add Content</span>
          </button>
          <div id="streamingOutput" class="output-area" style="display: none;"></div>
        </div>
      </div>

      <!-- Tab: Library -->
      <div id="library-tab" class="tab-content">
        <div class="feature-group">
          <label>Your Saved Videos</label>
          <div id="libraryList" class="output-area" style="background: #f5f3f0; color: #4b5563;">
            <small>Loading your library...</small>
          </div>
          <button class="btn btn-secondary" id="refreshLibraryBtn" style="margin-top: 0.5rem;">
            🔄 Refresh Library
          </button>
        </div>
      </div>

      <!-- Footer -->
      <div class="footer">
        <button class="btn btn-secondary" id="settingsBtn" style="flex: 0.5;">⚙️</button>
        <button class="btn btn-secondary" id="logoutBtn">Logout</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
